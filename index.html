function apiCall(sys, msgs, onOk, onErr) {
  if (WORKER_URL.indexOf("DEIN-NAME") !== -1) { onErr("Bitte Worker-URL in index.html eintragen!"); return; }
  fetch(WORKER_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:msgs})
  }).then(function(res){ return res.json(); })
  .then(function(data){
    if (data.error) { onErr(data.error.message || data.error); return; }
    var reply = ""; var parts = data.content || [];
    for (var i=0; i<parts.length; i++) { if(parts[i].text) reply += parts[i].text; }
    onOk(reply);
  }).catch(function(e){ onErr(e.message || "Verbindungsfehler"); });
}

    els.push(h("path",{key:"cloud",d:"M "+(fx-50)+" "+(fy-65)+" Q "+(fx-55)+" "+(fy-90)+" "+(fx-20)+" "+(fy-90)+" Q "+fx+" "+(fy-102)+" "+(fx+20)+" "+(fy-90)+" Q "+(fx+55)+" "+(fy-90)+" "+(fx+50)+" "+(fy-65)+" Q "+(fx+55)+" "+(fy-52)+" "+(fx+28)+" "+(fy-48)+" Q "+fx+" "+(fy-44)+" "+(fx-28)+" "+(fy-48)+" Q "+(fx-55)+" "+(fy-52)+" "+(fx-50)+" "+(fy-65)+" Z",fill:"#fff8e7",stroke:"#5d4e37",strokeWidth:"2",opacity:"0.9"}));

function App() {
